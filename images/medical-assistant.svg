<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b5a"/>
      <stop offset="100%" style="stop-color:#2a9d8f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="250" fill="url(#accent)"/>
  <circle cx="680" cy="100" r="100" fill="rgba(255,255,255,0.04)"/>
  <circle cx="120" cy="400" r="90" fill="rgba(255,255,255,0.04)"/>
  <!-- Stethoscope icon -->
  <circle cx="400" cy="170" r="45" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="3"/>
  <circle cx="400" cy="170" r="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Stethoscope tubes -->
  <path d="M370 205 Q370 260 340 280" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
  <path d="M430 205 Q430 260 460 280" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
  <!-- Ear pieces -->
  <circle cx="340" cy="280" r="6" fill="rgba(255,255,255,0.7)"/>
  <circle cx="460" cy="280" r="6" fill="rgba(255,255,255,0.7)"/>
  <!-- Y connector -->
  <path d="M340 280 Q400 320 460 280" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Program name -->
  <text x="400" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="white" letter-spacing="1">Medical Assistant</text>
  <text x="400" y="405" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" letter-spacing="2">STUDENTS IN TRAINING</text>
  <rect x="300" y="425" width="200" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
</svg>